<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css">
  <script src="/scripts/auth.js" defer></script>
</head>
<body>
  <main class="shell">
    <section class="auth-layout">
      <section class="hero-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in</h1>
        <p class="muted">Use the account you verified over email. Successful login stores the JWT token in browser storage for this demo deployment.</p>
      </section>

      <section class="panel">
        <p class="eyebrow">Access</p>
        <h2>Login</h2>
        <div id="login-status" class="status"></div>
        <form id="login-form" class="stack">
          <label class="field">
            <span>Login ID</span>
            <input id="loginLoginId" required>
          </label>
          <label class="field">
            <span>Password</span>
            <input id="loginPassword" type="password" required>
          </label>
          <button class="button button-primary" type="submit">Sign In</button>
        </form>
        <div class="grid-two">
          <a class="button button-ghost" href="/account/register/">Create account</a>
          <a class="button button-ghost" href="/account/verify/">Verify OTP</a>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
