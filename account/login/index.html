<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Sign In - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=3">
  <script src="/scripts/auth.js?v=3" defer></script>
</head>
<body>
  <main class="shell">
    <section class="auth-layout">
      <section class="hero-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in</h1>
        <p class="muted">Access your CoreInventory workspace. Please sign in with your verified credentials to continue managing your stock operations.</p>
      </section>

      <section class="panel">
        <p class="eyebrow">Access</p>
        <h2>Login</h2>
        <div id="login-status" class="status"></div>
        <form id="login-form" class="stack">
          <label class="field">
            <span>Login ID</span>
            <input id="loginLoginId" required>
          </label>
          <label class="field">
            <span>Password</span>
            <input id="loginPassword" type="password" required>
          </label>
          <button class="button button-primary" type="submit">Sign In</button>
        </form>
        <div class="grid-two">
          <button class="button button-ghost" type="button" data-nav="/account/register/">Create account</button>
          <button class="button button-ghost" type="button" data-nav="/account/verify/">Verify OTP</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
