<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=4">
  <script src="/scripts/auth.js?v=4" defer></script>
  <style>
    body { background: var(--bg); overflow-x: hidden; }
    .auth-layout { align-items: center; min-height: 85vh; display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 4rem; }
    .hero-card { background: linear-gradient(145deg, #112d31, #090e11); padding: 5rem 4rem; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 60px 120px rgba(0,0,0,0.6); backdrop-filter: blur(20px); animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
    .hero-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0, 210, 255, 0.08) 0%, transparent 60%); animation: auroraMove 25s infinite linear; pointer-events: none; }
    .hero-card h1 { font-family: var(--font-display); font-size: 5rem; line-height: 0.95; margin: 1.5rem 0; letter-spacing: -0.04em; color: #fff; }
    .panel { border-radius: 40px; animation: fadeSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1); padding: 4rem; background: var(--panel); border: 1px solid var(--line); backdrop-filter: blur(40px); }
    .field input { background: rgba(255,255,255,0.03); color: #fff; backdrop-filter: blur(10px); height: 56px; font-size: 1rem; border-radius: 16px; border: 1px solid var(--line); }
    .field input:focus { background: rgba(255,255,255,0.06); border-color: var(--teal); }
    .brand-float { position: absolute; top: 4rem; left: 4rem; animation: fadeSlideUp 0.6s ease-out; }
    .muted { color: var(--muted); }
    @media(max-width: 1000px) { .auth-layout { grid-template-columns: 1fr; margin-top: 8rem; gap: 2rem; } .hero-card { display:none; } }

  </style>
</head>
<body>
  <div class="brand-float">
    <div class="brand">
      <span class="brand-mark">CI</span>
      <strong style="color:var(--teal-deep); font-size: 1.1rem;">CoreInventory</strong>
    </div>
  </div>
  
  <main class="shell">
    <section class="auth-layout" style="margin-top: 4rem;">
      <section class="hero-card">
        <p class="eyebrow" style="color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1);">Verified Access</p>
        <h1>Welcome back</h1>
        <p style="font-size: 1.1rem; opacity: 0.9;">CoreInventory Enterprise Workspace. Manage your global stock movements with precision and clarity.</p>
        <div style="margin-top: 2rem; display: flex; gap: 0.5rem; opacity: 0.6; font-size: 0.85rem; font-weight: 700; text-transform: uppercase;">
          <span>SECURE</span> • <span>REAL-TIME</span> • <span>EFFICIENT</span>
        </div>
      </section>

      <section class="panel">
        <p class="eyebrow">Enterprise Identity</p>
        <h2 style="margin: 0.25rem 0 1.5rem; font-weight: 800;">Sign In</h2>
        <div id="login-status" class="status" style="margin-bottom: 1.25rem;"></div>
        <form id="login-form" class="stack">
          <label class="field">
            <span>Login ID</span>
            <input id="loginLoginId" placeholder="e.g. vipulojha" required>
          </label>
          <label class="field">
            <span>Password</span>
            <input id="loginPassword" type="password" placeholder="••••••••" required>
          </label>
          <button class="button button-primary" type="submit" style="margin-top: 0.5rem; width: 100%;">Continue to Workspace</button>
        </form>
        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--line); padding-top: 1.5rem;">
          <p class="muted" style="font-size: 0.9rem; margin-bottom: 1rem;">New to the platform?</p>
          <button class="button button-ghost" type="button" data-nav="/account/register/" style="width: 100%;">Create Enterprise Account</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
