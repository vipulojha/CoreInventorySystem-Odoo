<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Orders - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=4">
  <script src="/scripts/auth.js?v=4" defer></script>
  <style>
    .page-title { margin-bottom: 3rem; animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .data-table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.3); border:1px solid var(--line); animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .data-table th, .data-table td { padding:1.25rem 1.5rem; text-align:left; border-bottom:1px solid var(--line); font-size: 0.9rem; }
    .data-table th { background:rgba(255,255,255,0.02); color:var(--teal); font-weight:800; text-transform:uppercase; font-size:0.7rem; letter-spacing:0.1em; }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tbody tr:hover { background:rgba(255,255,255,0.04); cursor:pointer; }
    .badge { padding:0.4rem 1rem; border-radius:99px; font-size:0.65rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; border: 1px solid transparent; }
    .status-draft { background:rgba(143, 163, 173, 0.1); color:var(--muted); border-color: rgba(143, 163, 173, 0.2); }
    .status-ready { background:rgba(0, 210, 255, 0.1); color:var(--teal); border-color: rgba(0, 210, 255, 0.2); }
    .status-done { background:rgba(0, 242, 96, 0.1); color:var(--success); border-color: rgba(0, 242, 96, 0.2); }
    .status-waiting { background:rgba(248, 181, 0, 0.1); color:var(--amber); border-color: rgba(248, 181, 0, 0.2); }
    .status-cancelled { background:rgba(255, 75, 43, 0.1); color:var(--danger); border-color: rgba(255, 75, 43, 0.2); }

  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">CI</span>
        <div><strong>CoreInventory</strong><div class="muted">Enterprise Workspace</div></div>
      </div>
      <nav style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="button button-ghost" type="button" data-nav="/dashboard/">Dashboard</button>
        <button class="button button-ghost" type="button" data-nav="/operations/">Operations</button>
        <button class="button button-ghost" type="button" data-nav="/products/">Products</button>
        <button class="button button-ghost" type="button" data-nav="/stock/">Stock</button>
        <button class="button button-ghost" type="button" data-nav="/my-orders/" style="background:rgba(20,111,116,0.12);">My Orders</button>
        <button class="button button-ghost" type="button" data-nav="/history/">Move History</button>
        <button class="button button-ghost" type="button" data-nav="/transfer/" data-admin-only>Transfer</button>
        <button class="button button-ghost" type="button" data-nav="/settings/" data-admin-only>Settings</button>
        <button id="logout-button" class="button button-ghost" type="button">Logout</button>
      </nav>
    </header>

    <div class="page-title">
      <p class="eyebrow">Personal Pipeline</p>
      <h1 style="margin:0.25rem 0 0.75rem; font-family:var(--font-display); font-size: 3.5rem; letter-spacing: -0.03em; color:#fff;">My Orders</h1>
      <p class="muted" style="max-width: 600px; font-size: 1.1rem;">Track your requisition status and fulfillment progress in real-time.</p>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Reference</th>
          <th>Type</th>
          <th>Items</th>
          <th>Total Value</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="6" style="text-align:center;color:var(--muted);">Loading…</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = requireAuth();
      if (!user) return;
      applyRbac(user);
      const logoutBtn = document.getElementById("logout-button");
      if (logoutBtn) logoutBtn.addEventListener("click", () => { localStorage.removeItem("coreinventory.token"); localStorage.removeItem("coreinventory.user"); window.location.href = "/account/login/"; });

      const token = localStorage.getItem("coreinventory.token");
      fetch("/api/inventory/my-orders", { headers: { "Authorization": "Bearer " + token } })
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById("orders-body");
          if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">You have no orders yet. Buy a product to get started!</td></tr>';
            return;
          }
          tbody.innerHTML = data.map(o => `<tr onclick="window.location.href='/operations/detail/?ref=${encodeURIComponent(o.reference)}'">
            <td><strong>${o.reference}</strong></td>
            <td>${o.operation_type}</td>
            <td>${o.line_count}</td>
            <td>₹${parseFloat(o.total_value || 0).toLocaleString()}</td>
            <td>${new Date(o.created_at).toLocaleDateString()}</td>
            <td><span class="badge status-${o.status.toLowerCase()}">${o.status}</span></td>
          </tr>`).join("");
        }).catch(console.error);
    });
  </script>
</body>
</html>
