<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operations - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=4">
  <script src="/scripts/auth.js?v=4" defer></script>
  <style>
    .page-title { margin-bottom: 2rem; animation: fadeSlideUp 0.6s ease-out; }
    .filter-row { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center; animation: fadeSlideUp 0.8s ease-out; }
    .filter-row select { padding:0.75rem 1.25rem; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,0.7); backdrop-filter:blur(8px); font:inherit; cursor:pointer; transition: all 0.3s ease; }
    .filter-row select:focus { outline:none; border-color:var(--teal); background:#fff; box-shadow:0 8px 20px rgba(0,0,0,0.04); }
    .data-table { animation: fadeSlideUp 1s ease-out; }
    .badge { padding:0.25rem 0.75rem; border-radius:99px; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:0.02em; }
    .status-draft { background:rgba(116, 102, 81, 0.1); color:var(--muted); }
    .status-ready { background:hsla(var(--h), 70%, 40%, 0.1); color:var(--teal); }
    .status-done { background:rgba(47, 109, 68, 0.1); color:var(--success); }
    .status-waiting { background:rgba(201, 130, 28, 0.1); color:var(--amber); }
    .status-cancelled { background:rgba(170, 86, 53, 0.1); color:var(--danger); }
    .hint { font-size:0.85rem; color:var(--muted); margin-top:1rem; animation: fadeSlideUp 1.2s ease-out; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">CI</span>
        <div><strong>CoreInventory</strong><div class="muted">Enterprise Workspace</div></div>
      </div>
      <nav style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="button button-ghost" type="button" data-nav="/dashboard/">Dashboard</button>
        <button class="button button-ghost" type="button" data-nav="/operations/" style="background:rgba(20,111,116,0.12);">Operations</button>
        <button class="button button-ghost" type="button" data-nav="/products/">Products</button>
        <button class="button button-ghost" type="button" data-nav="/stock/">Stock</button>
        <button class="button button-ghost" type="button" data-nav="/my-orders/">My Orders</button>
        <button class="button button-ghost" type="button" data-nav="/history/">Move History</button>
        <button class="button button-ghost" type="button" data-nav="/transfer/" data-admin-only>Transfer</button>
        <button class="button button-ghost" type="button" data-nav="/settings/" data-admin-only>Settings</button>
        <button id="logout-button" class="button button-ghost" type="button">Logout</button>
      </nav>
    </header>

    <div class="page-title">
      <p class="eyebrow">Warehouse</p>
      <h1 style="margin:0.25rem 0 0.5rem;">Operations</h1>
      <p class="muted">View receipts, deliveries, and adjustments. Click any row to see details and advance its status.</p>
    </div>

    <div class="filter-row">
      <select id="type-filter">
        <option value="">All Types</option>
        <option value="Receipt">Receipts</option>
        <option value="Delivery">Deliveries</option>
        <option value="Adjustment">Adjustments</option>
      </select>
      <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="Draft">Draft</option>
        <option value="Waiting">Waiting</option>
        <option value="Ready">Ready</option>
        <option value="Done">Done</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Reference</th>
          <th>Type</th>
          <th>Contact</th>
          <th>Scheduled</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="operations-table-body">
        <tr><td colspan="5" style="text-align:center; color:var(--muted);">Loading…</td></tr>
      </tbody>
    </table>
    <p class="hint">Click any row to view full details and validate the operation.</p>
  </main>

  <script>
    let allOps = [];

    function renderOps(data) {
      const tbody = document.getElementById("operations-table-body");
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">No operations found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(o => `<tr onclick="window.location.href='/operations/detail/?ref=${encodeURIComponent(o.reference)}'">
        <td><strong>${o.reference}</strong></td>
        <td>${o.operation_type}</td>
        <td>${o.contact_name || "—"}</td>
        <td>${new Date(o.schedule_date).toLocaleDateString()}</td>
        <td><span class="badge status-${o.status.toLowerCase()}">${o.status}</span></td>
      </tr>`).join("");
    }

    function applyFilters() {
      const type = document.getElementById("type-filter").value;
      const status = document.getElementById("status-filter").value;
      renderOps(allOps.filter(o => (!type || o.operation_type === type) && (!status || o.status === status)));
    }

    document.addEventListener("DOMContentLoaded", () => {
      const user = requireAuth();
      if (!user) return;
      applyRbac(user);
      const logoutBtn = document.getElementById("logout-button");
      if (logoutBtn) logoutBtn.addEventListener("click", () => { localStorage.removeItem("coreinventory.token"); localStorage.removeItem("coreinventory.user"); window.location.href = "/account/login/"; });

      document.getElementById("type-filter").addEventListener("change", applyFilters);
      document.getElementById("status-filter").addEventListener("change", applyFilters);

      fetch("/api/inventory/operations")
        .then(r => r.json())
        .then(data => { allOps = data || []; renderOps(allOps); })
        .catch(console.error);
    });
  </script>
</body>
</html>
