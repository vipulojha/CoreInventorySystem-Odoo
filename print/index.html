<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=4">
  <script src="/scripts/auth.js?v=4" defer></script>
  <style>
    @media print {
      .topbar, .no-print { display: none !important; }
      body { background: #fff !important; }
      .print-doc { box-shadow: none !important; border: 1px solid #ccc; }
    }
    .print-doc { background:#fff; border-radius:var(--radius); padding:2.5rem; max-width:700px; margin:0 auto; box-shadow:var(--shadow-soft); }
    .print-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; border-bottom:2px solid var(--teal); padding-bottom:1rem; }
    .print-logo { font-size:1.5rem; font-weight:900; color:var(--teal-deep); }
    .print-meta { text-align:right; font-size:0.88rem; color:var(--muted); }
    .print-meta strong { color:var(--body-text); }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem 2rem; margin-bottom:1.5rem; font-size:0.9rem; }
    .info-grid dt { color:var(--muted); font-weight:700; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.04em; }
    .info-grid dd { margin:0; font-weight:600; }
    .print-table { width:100%; border-collapse:collapse; margin-bottom:1.5rem; }
    .print-table th, .print-table td { padding:0.7rem 0.8rem; text-align:left; border-bottom:1px solid #e0ddd7; font-size:0.9rem; }
    .print-table th { background:#f4f2ee; font-weight:800; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.05em; }
    .print-table tfoot td { font-weight:800; border-top:2px solid var(--teal); }
    .badge { padding:0.25rem 0.65rem; border-radius:999px; font-size:0.75rem; font-weight:800; text-transform:uppercase; border:1.5px solid currentColor; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar no-print">
      <div class="brand">
        <span class="brand-mark">CI</span>
        <div><strong>CoreInventory</strong><div class="muted">Enterprise Workspace</div></div>
      </div>
      <nav style="display:flex;gap:0.5rem;">
        <button class="button button-ghost" type="button" onclick="window.print()">🖨 Print</button>
        <button class="button button-ghost" type="button" onclick="history.back()">← Back</button>
        <button id="logout-button" class="button button-ghost" type="button">Logout</button>
      </nav>
    </header>

    <div id="loading" style="text-align:center;padding:3rem;color:var(--muted);">Generating receipt…</div>
    <div id="print-doc" class="print-doc" style="display:none; color:#1a1714;">
      <div class="print-header">
        <div>
          <div class="print-logo">CoreInventory</div>
          <div style="font-size:0.85rem; color:#888; margin-top:0.2rem;">Enterprise Inventory Management</div>
        </div>
        <div class="print-meta">
          <strong id="doc-ref"></strong><br>
          <span id="doc-type"></span><br>
          <span id="doc-date"></span><br>
          Status: <span id="doc-status"></span>
        </div>
      </div>

      <dl class="info-grid">
        <dt>Contact</dt><dd id="doc-contact"></dd>
        <dt>Warehouse</dt><dd id="doc-warehouse"></dd>
        <dt>From</dt><dd id="doc-from"></dd>
        <dt>To</dt><dd id="doc-to"></dd>
        <dt>Notes</dt><dd id="doc-notes"></dd>
      </dl>

      <table class="print-table">
        <thead><tr><th>Product</th><th>SKU</th><th>Qty</th><th>Unit Cost</th><th>Total</th></tr></thead>
        <tbody id="print-lines"></tbody>
        <tfoot><tr><td colspan="4" style="text-align:right;">Grand Total</td><td id="print-total">₹0</td></tr></tfoot>
      </table>

      <div style="font-size:0.8rem;color:#888; margin-top:2rem; border-top:1px solid #e0ddd7; padding-top:1rem;">
        Generated by CoreInventory on <span id="print-now"></span>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = requireAuth();
      if (!user) return;
      const logoutBtn = document.getElementById("logout-button");
      if (logoutBtn) logoutBtn.addEventListener("click", () => { localStorage.removeItem("coreinventory.token"); localStorage.removeItem("coreinventory.user"); window.location.href = "/account/login/"; });

      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");
      if (!ref) { window.location.href = "/operations/"; return; }

      fetch("/api/inventory/operation-detail?ref=" + encodeURIComponent(ref))
        .then(r => r.json())
        .then(op => {
          document.getElementById("loading").style.display = "none";
          document.getElementById("print-doc").style.display = "block";
          document.getElementById("doc-ref").textContent = op.reference;
          document.getElementById("doc-type").textContent = op.operation_type;
          document.getElementById("doc-date").textContent = new Date(op.schedule_date).toLocaleDateString("en-IN", { day:"2-digit", month:"long", year:"numeric" });
          document.getElementById("doc-status").textContent = op.status;
          document.getElementById("doc-contact").textContent = op.contact_name || "—";
          document.getElementById("doc-warehouse").textContent = op.warehouse_name;
          document.getElementById("doc-from").textContent = op.from_location || "—";
          document.getElementById("doc-to").textContent = op.to_location || "—";
          document.getElementById("doc-notes").textContent = op.notes || "—";
          document.getElementById("print-now").textContent = new Date().toLocaleString("en-IN");

          let total = 0;
          document.getElementById("print-lines").innerHTML = (op.lines || []).map(l => {
            const lineTotal = l.quantity * l.unit_cost;
            total += lineTotal;
            return `<tr><td>${l.product_name}</td><td>${l.sku}</td><td>${l.quantity}</td><td>₹${parseFloat(l.unit_cost).toLocaleString()}</td><td>₹${lineTotal.toLocaleString()}</td></tr>`;
          }).join("");
          document.getElementById("print-total").textContent = "₹" + total.toLocaleString();
        }).catch(e => {
          document.getElementById("loading").textContent = "Error: " + e.message;
        });
    });
  </script>
</body>
</html>
