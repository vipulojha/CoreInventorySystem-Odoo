<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products - CoreInventory</title>
  <link rel="stylesheet" href="/styles/site.css?v=4">
  <script src="/scripts/auth.js?v=4" defer></script>
  <style>
    .page-title { margin-bottom: 3rem; animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .toolbar { display:flex; align-items:center; gap:1.25rem; margin-bottom:2rem; flex-wrap:wrap; animation: fadeSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .search-input { flex:1; min-width:280px; padding:1rem 1.5rem; border-radius:16px; border:1px solid var(--line); background:rgba(255,255,255,0.03); color:#fff; backdrop-filter:blur(10px); font:inherit; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .search-input:focus { outline:none; border-color:var(--teal); background:rgba(255,255,255,0.08); box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1); }
    .data-table { animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-action { padding:0.5rem 1rem; border-radius:12px; border:1px solid transparent; cursor:pointer; font:inherit; font-size:0.8rem; font-weight:700; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn-buy { background: rgba(0, 210, 255, 0.1); color: var(--teal); border-color: rgba(0, 210, 255, 0.2); }
    .btn-buy:hover { background: var(--teal); color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3); }
    .btn-discard { background: rgba(248, 181, 0, 0.1); color: var(--amber); border-color: rgba(248, 181, 0, 0.2); margin-left: 0.5rem; }
    .btn-discard:hover { background: var(--amber); color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(248, 181, 0, 0.3); }
    .btn-edit { background: rgba(255, 255, 255, 0.05); color: var(--muted); border-color: var(--line); margin-left: 0.5rem; }
    .btn-edit:hover { background: var(--text); color: var(--bg); transform: translateY(-3px); }
    .btn-del { background: rgba(255, 75, 43, 0.1); color: var(--danger); border-color: rgba(255, 75, 43, 0.2); margin-left: 0.5rem; }
    .btn-del:hover { background: var(--danger); color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 75, 43, 0.3); }
    .modal h2 { letter-spacing: -0.02em; }
    .qty-row input { width:100px; padding:0.75rem; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,0.05); color:#fff; font:inherit; font-size:1.2rem; font-weight:800; text-align:center; }
    .modal label span { font-size: 0.75rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; }

  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">CI</span>
        <div><strong>CoreInventory</strong><div class="muted">Enterprise Workspace</div></div>
      </div>
      <nav style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="button button-ghost" type="button" data-nav="/dashboard/">Dashboard</button>
        <button class="button button-ghost" type="button" data-nav="/operations/">Operations</button>
        <button class="button button-ghost" type="button" data-nav="/products/" style="background:rgba(20,111,116,0.12);">Products</button>
        <button class="button button-ghost" type="button" data-nav="/stock/">Stock</button>
        <button class="button button-ghost" type="button" data-nav="/my-orders/">My Orders</button>
        <button class="button button-ghost" type="button" data-nav="/history/">Move History</button>
        <button class="button button-ghost" type="button" data-nav="/transfer/" data-admin-only>Transfer</button>
        <button class="button button-ghost" type="button" data-nav="/settings/" data-admin-only>Settings</button>
        <button id="logout-button" class="button button-ghost" type="button">Logout</button>
      </nav>
    </header>

    <div class="page-title">
      <p class="eyebrow">Inventory Catalog</p>
      <h1 style="margin:0.25rem 0 0.75rem; font-family:var(--font-display); font-size: 3.5rem; letter-spacing: -0.03em; color:#fff;">Products</h1>
      <p class="muted" style="max-width: 600px; font-size: 1.1rem;">Browse global SKUs, place buy orders, or manage catalog entries with enterprise-grade precision.</p>
    </div>

    <div class="toolbar">
      <input class="search-input" type="search" id="search-input" placeholder="Search products…">
      <button class="button button-primary" id="btn-add" data-admin-only type="button" style="white-space:nowrap;">+ Add Product</button>
    </div>

    <div id="status-msg" class="status" style="margin-bottom:1rem;"></div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Unit Cost</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-table-body">
        <tr><td colspan="3" style="text-align:center; color:var(--muted);">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Unified Modal System -->
  <div id="action-modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="action-modal-title" style="margin:0; color:var(--teal-deep);">Buy Product</h2>
        <button class="button button-ghost" onclick="closeActionModal()" style="min-height:unset; padding:0.5rem 1rem; border-radius:10px;">Close</button>
      </div>
      <div class="modal-body">
        <p id="action-modal-sub" style="font-weight:700; margin-bottom:1rem; color:var(--muted);"></p>
        <input type="hidden" id="action-modal-pid">
        <input type="hidden" id="action-modal-type">
        <div class="stack">
          <label class="field">
            <span>Quantity</span>
            <div class="qty-row">
              <button class="button button-ghost btn-sm" type="button" onclick="adjustQty(-1)" style="min-height:42px;">−</button>
              <input id="action-qty" type="number" min="1" value="1" style="height:42px;">
              <button class="button button-ghost btn-sm" type="button" onclick="adjustQty(1)" style="min-height:42px;">+</button>
            </div>
          </label>
          <label class="field"><span>Note (optional)</span><input id="action-note" placeholder="e.g. for Conference Room 3"></label>
        </div>
        <div id="action-status" class="status" style="margin-top:1rem;"></div>
        <div class="actions" style="margin-top:2rem;">
          <button class="button button-primary" id="action-confirm" type="button" style="width:100%;">Confirm Action</button>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="edit-modal-title" style="margin:0; color:var(--teal-deep);">Add Product</h2>
        <button class="button button-ghost" onclick="closeEditModal()" style="min-height:unset; padding:0.5rem 1rem; border-radius:10px;">Close</button>
      </div>
      <div class="modal-body">
        <div class="stack">
          <input type="hidden" id="edit-id">
          <label class="field"><span>SKU</span><input id="edit-sku" maxlength="32" required placeholder="e.g. CHAIR002"></label>
          <label class="field"><span>Name</span><input id="edit-name" maxlength="120" required placeholder="e.g. Ergonomic Chair"></label>
          <label class="field"><span>Unit Cost (₹)</span><input id="edit-cost" type="number" min="0" step="0.01" value="0"></label>
        </div>
        <div id="edit-status" class="status" style="margin-top:1rem;"></div>
        <div class="actions" style="margin-top:2rem;">
          <button class="button button-primary" id="edit-save" type="button" style="width:100%;">Save Product</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allProducts = [];
    let currentUser = null;

    function showStatus(msg, type) {
      const el = document.getElementById("status-msg");
      el.className = `status visible ${type}`;
      el.textContent = msg;
      setTimeout(() => { el.className = "status"; }, 4000);
    }

    function showModalStatus(elId, msg, type) {
      const el = document.getElementById(elId);
      el.className = `status visible ${type}`;
      el.textContent = msg;
    }

    window.adjustQty = function(delta) {
      const input = document.getElementById("action-qty");
      input.value = Math.max(1, parseInt(input.value) + delta);
    };

    function renderProducts(data) {
      const tbody = document.getElementById("products-table-body");
      const isAdmin = currentUser && currentUser.role === "admin";
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);">No products found</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(p => `<tr>
        <td>
          <strong>${p.name}</strong>
          <div style="font-size:0.78rem;color:var(--muted);margin-top:2px;">${p.sku}</div>
        </td>
        <td>₹${parseFloat(p.unit_cost).toLocaleString()}</td>
        <td>
          <button class="btn-action btn-buy" onclick="openAction(${p.id},'${p.name.replace(/'/g,"\\'")}','buy')">Buy</button>
          <button class="btn-action btn-discard" onclick="openAction(${p.id},'${p.name.replace(/'/g,"\\'")}','discard')">Discard</button>
          ${isAdmin ? `<button class="btn-action btn-edit" onclick="openEdit(${p.id},'${p.sku}','${p.name.replace(/'/g,"\\'")}',${p.unit_cost})">Edit</button>
                       <button class="btn-action btn-del" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">Delete</button>` : ""}
        </td>
      </tr>`).join("");
    }

    function applySearch() {
      const q = document.getElementById("search-input").value.toLowerCase();
      renderProducts(q ? allProducts.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) : allProducts);
    }

    function closeActionModal() {
      document.getElementById("action-modal-overlay").classList.remove("active");
    }
    function closeEditModal() {
      document.getElementById("edit-modal-overlay").classList.remove("active");
    }

    window.openAction = function(pid, pname, type) {
      document.getElementById("action-modal-pid").value = pid;
      document.getElementById("action-modal-type").value = type;
      document.getElementById("action-modal-title").textContent = type === "buy" ? "Buy Product" : "Discard Product";
      document.getElementById("action-modal-sub").textContent = pname;
      document.getElementById("action-qty").value = 1;
      document.getElementById("action-note").value = "";
      document.getElementById("action-status").className = "status";
      document.getElementById("action-confirm").textContent = type === "buy" ? "Place Order" : "Confirm Discard";
      document.getElementById("action-confirm").style.background = type === "buy" ? "" : "linear-gradient(135deg,var(--danger),#8b3a1a)";
      document.getElementById("action-modal-overlay").classList.add("active");
    };

    window.openEdit = function(id, sku, name, cost) {
      document.getElementById("edit-modal-title").textContent = id ? "Edit Product" : "Add Product";
      document.getElementById("edit-id").value = id;
      document.getElementById("edit-sku").value = sku;
      document.getElementById("edit-name").value = name;
      document.getElementById("edit-cost").value = cost;
      document.getElementById("edit-status").className = "status";
      document.getElementById("edit-modal-overlay").classList.add("active");
    };

    async function confirmAction() {
      const pid = document.getElementById("action-modal-pid").value;
      const type = document.getElementById("action-modal-type").value;
      const qty = parseInt(document.getElementById("action-qty").value);
      const note = document.getElementById("action-note").value.trim();
      if (!qty || qty < 1) { showModalStatus("action-status", "Enter a valid quantity.", "error"); return; }
      showModalStatus("action-status", "Processing...", "info");
      try {
        const token = localStorage.getItem("coreinventory.token");
        const res = await fetch("/api/inventory/buy", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ product_id: pid, quantity: qty, action: type, note })
        });
        const data = await res.json();
        if (res.ok) {
          closeActionModal();
          showStatus(data.message, "success");
          loadProducts();
        } else {
          showModalStatus("action-status", data.message, "error");
        }
      } catch(e) { showModalStatus("action-status", e.message, "error"); }
    }

    async function saveProduct() {
      const id = document.getElementById("edit-id").value;
      const payload = { id: id || undefined, sku: document.getElementById("edit-sku").value.trim(), name: document.getElementById("edit-name").value.trim(), unit_cost: document.getElementById("edit-cost").value };
      if (!payload.sku || !payload.name) { showModalStatus("edit-status", "SKU and name are required.", "error"); return; }
      showModalStatus("edit-status", "Saving...", "info");
      try {
        const res = await fetch("/api/inventory/products", { method: id ? "PUT" : "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) { closeEditModal(); showStatus(data.message, "success"); loadProducts(); }
        else { showModalStatus("edit-status", data.message, "error"); }
      } catch(e) { showModalStatus("edit-status", e.message, "error"); }
    }

    function loadProducts() {
      fetch("/api/inventory/products")
        .then(r => r.json())
        .then(data => { allProducts = data || []; renderProducts(allProducts); })
        .catch(console.error);
    }

    document.addEventListener("DOMContentLoaded", () => {
      currentUser = requireAuth();
      if (!currentUser) return;
      applyRbac(currentUser);
      const logoutBtn = document.getElementById("logout-button");
      if (logoutBtn) logoutBtn.addEventListener("click", () => { localStorage.removeItem("coreinventory.token"); localStorage.removeItem("coreinventory.user"); window.location.href = "/account/login/"; });
      document.getElementById("search-input").addEventListener("input", applySearch);
      document.getElementById("btn-add").addEventListener("click", () => { openEdit("","","","0"); });
      document.getElementById("action-confirm").addEventListener("click", confirmAction);
      document.getElementById("edit-save").addEventListener("click", saveProduct);
      loadProducts();
    });
  </script>
</body>
</html>
